name: CLI

on:
  push:
    paths:
      - 'cli/**'
      - '.github/workflows/cli.yml'
  pull_request:
    paths:
      - 'cli/**'
      - '.github/workflows/cli.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: cli/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -v -race

      - name: go vet
        run: go vet ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: cli/go.sum

      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: cli
          version: v1.64

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: cli/go.sum

      - name: Build binaries
        run: |
          cd cli
          GOOS=linux  GOARCH=amd64 go build -o ../dist/sdbx-linux-amd64   ./cmd/sdbx
          GOOS=linux  GOARCH=arm64 go build -o ../dist/sdbx-linux-arm64   ./cmd/sdbx
          GOOS=darwin GOARCH=amd64 go build -o ../dist/sdbx-darwin-amd64  ./cmd/sdbx
          GOOS=darwin GOARCH=arm64 go build -o ../dist/sdbx-darwin-arm64  ./cmd/sdbx

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdbx-binaries
          path: dist/
          retention-days: 30

  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/cli/v')
    needs: [test, lint]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: cli/go.sum

      - name: Create semver tag for GoReleaser
        run: |
          VERSION="${GITHUB_REF_NAME#cli/}"
          git tag "$VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - uses: goreleaser/goreleaser-action@v6
        with:
          workdir: cli
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ env.VERSION }}
