version: 2

project_name: sdbx

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/sdbx
    binary: sdbx
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: securedbx
      name: homebrew-sdbx
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://securedbx.com"
    description: "Zero-knowledge file sharing CLI"
    install: |
      bin.install "sdbx"
    test: |
      system "#{bin}/sdbx --version"
